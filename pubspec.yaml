name: yks_akademi
description: YKS Akademi - Deneme Çöz
publish_to: 'none'
version: 1.2.4+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.3.3
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  shared_preferences: ^2.3.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3
  google_mobile_ads: ^7.0.0
  app_tracking_transparency: ^2.0.6+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
